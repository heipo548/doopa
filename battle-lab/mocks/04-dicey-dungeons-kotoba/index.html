<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>言葉サイコロ装填バトル — Battle Lab / DOOPA</title>
  <meta name="description" content="DOOPA バトルシステム試作場：Dicey Dungeons 参考の「言葉サイコロ装填バトル」モック。毎ターン出る『ことばの欠片』を言葉装置に入れて、村長の『閉じた心』をほどく。" />
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <!--
    Dicey Dungeons 参考「言葉サイコロ装填バトル」モック
    ・構造だけ参考：毎ターン出る「ことばの欠片（1〜6の音）」を「言葉装置」に装填して効果を出す
    ・見た目/固有表現はオリジナル。主人公L＝無機質／村長＝ポップだけど警戒、のズレを出す
    ・倒すのではなく、言葉で「閉じた心」をほどく
    ・依存ゼロ：HTML/CSS/JS のみ。data.js を増やせば装置・相手を足せる
  -->

  <header class="lab-head">
    <a class="back" href="../../">← Battle Lab</a>
    <div class="head-titles">
      <p class="lab-name">バトルシステム試作場 / Battle Lab</p>
      <h1 class="mock-title">Dicey Dungeons参考：言葉サイコロ装填バトル</h1>
      <p class="mock-title-en">Word Dice Loading Battle</p>
      <p class="disclaimer">これは完成版ではなく、バトルシステム検証用のモックです。</p>
      <div class="howto" id="howto"><!-- 説明文は main.js が LORE.howto から差し込む --></div>
    </div>
  </header>

  <main class="board">

    <!-- ===== 相手（村長） ===== -->
    <section class="enemy-zone">
      <div class="intent" aria-live="polite">
        <span class="intent-cap">次の感情</span>
        <span id="intent-label" class="intent-name">—</span>
        <span id="intent-detail" class="intent-detail"></span>
      </div>

      <div class="enemy-card">
        <div class="enemy-face" aria-hidden="true">
          <!-- ポップでかわいい、でも少し警戒している村長（インラインSVG・画像依存なし） -->
          <svg viewBox="0 0 120 120" width="92" height="92">
            <ellipse cx="60" cy="108" rx="30" ry="6" fill="#0000000f"/>
            <circle cx="60" cy="60" r="40" fill="#ffe4b5" stroke="#e7b870" stroke-width="2"/>
            <path d="M28 44 q32 -22 64 0" fill="none" stroke="#c9a15e" stroke-width="5" stroke-linecap="round"/>
            <!-- 少し細めた目＝警戒 -->
            <path d="M40 58 q6 -2 12 0" fill="none" stroke="#5b4a36" stroke-width="4" stroke-linecap="round"/>
            <path d="M68 58 q6 -2 12 0" fill="none" stroke="#5b4a36" stroke-width="4" stroke-linecap="round"/>
            <path d="M40 50 q6 -4 12 0 M68 50 q6 -4 12 0" fill="none" stroke="#b48a4e" stroke-width="2.5" stroke-linecap="round"/>
            <!-- への字ぎみの口＝身がまえ -->
            <path d="M50 80 q10 -4 20 0" fill="none" stroke="#a86b4a" stroke-width="3" stroke-linecap="round"/>
            <!-- 不安の汗 -->
            <path d="M92 54 q4 7 0 11 q-4 -4 0 -11Z" fill="#bfe0f2" stroke="#8fc3ea" stroke-width="1.2"/>
            <ellipse cx="40" cy="72" rx="5" ry="3" fill="#f6a8a8" opacity=".55"/>
            <ellipse cx="80" cy="72" rx="5" ry="3" fill="#f6a8a8" opacity=".55"/>
          </svg>
        </div>
        <div class="enemy-info">
          <div class="enemy-name" id="enemy-name">村長</div>
          <div class="enemy-title" id="enemy-title"></div>
          <div class="bar enemy-bar">
            <div class="bar-fill heart" id="enemy-heart-fill"></div>
            <span class="bar-cap">閉じた心</span>
            <span class="bar-num" id="enemy-heart-num">30 / 30</span>
          </div>
          <div class="status-row" id="enemy-status"></div>
        </div>
      </div>
    </section>

    <!-- ===== 場：ターン ===== -->
    <section class="field">
      <div class="turn">ターン <span id="turn-num">1</span></div>
      <div class="hint" id="hint"></div>
    </section>

    <!-- ===== プレイヤー（無機質な主人公 L） ===== -->
    <section class="player-zone">
      <div class="player-row">
        <div class="player-face" aria-hidden="true">
          <!-- 無機質なアンドロイドL（角ばった顔・走査線のひとつ目） -->
          <svg viewBox="0 0 120 120" width="72" height="72">
            <rect x="26" y="26" width="68" height="68" rx="10" fill="#e8edf1" stroke="#9fb0bd" stroke-width="2"/>
            <rect x="26" y="26" width="68" height="68" rx="10" fill="url(#scan)" opacity=".5"/>
            <rect x="40" y="54" width="40" height="9" rx="4" fill="#5d6b78"/>
            <rect x="44" y="56" width="9" height="5" rx="2" fill="#bfe0f2"/>
            <line x1="60" y1="26" x2="60" y2="16" stroke="#9fb0bd" stroke-width="2"/>
            <circle cx="60" cy="13" r="3" fill="#8fc3ea"/>
            <defs>
              <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
                <rect width="4" height="2" fill="#00000010"/>
              </pattern>
            </defs>
          </svg>
        </div>
        <div class="player-stats">
          <div class="player-tag">YOU — L / kotoba-android</div>
          <div class="bar player-bar">
            <div class="bar-fill noise" id="player-noise-fill"></div>
            <span class="bar-cap">ノイズ耐性</span>
            <span class="bar-num" id="player-noise-num">24 / 24</span>
          </div>
          <div class="block-line">受容：<span id="block-num">0</span></div>
          <div class="status-row" id="player-status"></div>
        </div>
      </div>
    </section>

    <!-- ===== ことばの欠片（プール） ===== -->
    <section class="kakera-zone">
      <div class="zone-cap">ことばの欠片<span class="zone-sub">（音の強さ 1〜6）</span></div>
      <div class="kakera-pool" id="kakera"></div>
    </section>

    <!-- ===== 言葉装置 ===== -->
    <section class="devices-zone">
      <div class="zone-cap">言葉装置<span class="zone-sub">（欠片を選んでから 押す）</span></div>
      <div class="devices" id="devices"></div>
      <button class="end-turn" id="end-turn-btn">ターン終了</button>
    </section>

    <!-- ===== ログ ===== -->
    <section class="log-zone">
      <div class="zone-cap">やりとりの記録</div>
      <div class="log" id="log"></div>
    </section>

  </main>

  <!-- ===== 勝敗オーバーレイ ===== -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box">
      <h2 class="overlay-title" id="overlay-title"></h2>
      <div class="overlay-text" id="overlay-text"></div>
      <div class="overlay-actions">
        <button class="restart" id="restart-btn">もう一度 遊ぶ</button>
        <a class="to-lab" href="../../">Battle Labに戻る</a>
      </div>
    </div>
  </div>

  <!-- 読み込み順：データ → 進行ルール → 描画 → 配線 -->
  <script src="js/data.js?v=1"></script>
  <script src="js/engine.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
