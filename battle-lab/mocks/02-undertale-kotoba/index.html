<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>言葉アクション対話バトル — Battle Lab / DOOPA</title>
  <meta name="description" content="DOOPA バトルシステム試作場：UNDERTALE 参考の「言葉アクション対話バトル」モック。倒すのではなく、言葉を選び、感情を避けて『閉じた心』をほどく。" />
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <!--
    UNDERTALE “参考”「言葉アクション対話バトル」モック
    ・主人公L＝言葉を覚えていない無機質なアンドロイド（YOU側は等幅＋ノイズ表現）
    ・相手＝ポップでかわいい村長。倒すのではなく、観察し言葉を選んで「閉じた心」をほどく
    ・1ターン＝「コマンド選択 → 村長のセリフ → 感情回避フェーズ(弾よけ) → 次ターン」
    ・依存ゼロ：HTML/CSS/JS のみ。data.js を増やせばコマンド・感情・弾を足せる
  -->

  <header class="lab-head">
    <a class="back" href="../../">← Battle Lab</a>
    <div class="head-titles">
      <p class="lab-name">バトルシステム試作場 / Battle Lab</p>
      <h1 class="mock-title">UNDERTALE参考：言葉アクション対話バトル</h1>
      <p class="mock-title-en">Word Action Dialogue Battle</p>
      <p class="disclaimer">これは完成版ではなく、バトルシステム検証用のモックです。</p>
    </div>
    <!-- 仕様で指定された説明文（敵を倒すのではなく…） -->
    <div class="howto" id="howto"></div>
  </header>

  <main class="board">

    <!-- ===== 相手（村長）：ポップだが警戒している ===== -->
    <section class="enemy-zone">
      <div class="enemy-card">
        <div class="enemy-face" aria-hidden="true">
          <!-- かわいいが、少し警戒した村長（インラインSVG・画像依存なし） -->
          <svg viewBox="0 0 120 120" width="92" height="92">
            <ellipse cx="60" cy="112" rx="30" ry="5" fill="#0000000f"/>
            <!-- 顔 -->
            <circle cx="60" cy="52" r="38" fill="#ffe4b5" stroke="#e7b870" stroke-width="2"/>
            <path d="M28 38 q32 -20 64 0" fill="none" stroke="#c9a15e" stroke-width="5" stroke-linecap="round"/>
            <!-- 少し下がった困り眉（警戒・心配） -->
            <path d="M40 40 q7 4 13 2 M67 42 q6 -2 13 -2" fill="none" stroke="#b48a4e" stroke-width="2.6" stroke-linecap="round"/>
            <circle cx="47" cy="52" r="4.6" fill="#5b4a36"/>
            <circle cx="73" cy="52" r="4.6" fill="#5b4a36"/>
            <!-- 少し開いた、ためらう口 -->
            <ellipse cx="60" cy="70" rx="5" ry="4" fill="#a86b4a"/>
            <ellipse cx="41" cy="64" rx="5" ry="3" fill="#f6a8a8" opacity=".6"/>
            <ellipse cx="79" cy="64" rx="5" ry="3" fill="#f6a8a8" opacity=".6"/>
            <!-- 警戒の汗ひとしずく -->
            <path d="M86 44 q4 6 0 9 q-4 -3 0 -9z" fill="#bfe0f2" stroke="#9cc7e0" stroke-width="1"/>
            <!-- 握っている小さな手帳 -->
            <g transform="translate(60 96) rotate(-8)">
              <rect x="-16" y="-9" width="32" height="20" rx="3" fill="#fff6e6" stroke="#d9b877" stroke-width="2"/>
              <line x1="-10" y1="-3" x2="10" y2="-3" stroke="#e0c590" stroke-width="1.6"/>
              <line x1="-10" y1="2"  x2="10" y2="2"  stroke="#e0c590" stroke-width="1.6"/>
              <line x1="0" y1="-9" x2="0" y2="11" stroke="#d9b877" stroke-width="1.4"/>
            </g>
          </svg>
        </div>
        <div class="enemy-info">
          <div class="enemy-name" id="enemy-name">村長</div>
          <div class="enemy-title" id="enemy-title"></div>

          <!-- 理解度 -->
          <div class="bar enemy-bar">
            <div class="bar-fill und" id="und-fill"></div>
            <span class="bar-cap">理解度</span>
            <span class="bar-num" id="und-num">0 / 100</span>
          </div>
          <!-- 警戒度 -->
          <div class="bar enemy-bar war-bar">
            <div class="bar-fill war" id="war-fill"></div>
            <span class="bar-cap">警戒度</span>
            <span class="bar-num" id="war-num">0 / 100</span>
          </div>
          <!-- 閉じた心（テキスト表現） -->
          <div class="heart-line">
            閉じた心：<span id="heart-text" class="heart-text">まだ固い</span>
          </div>
        </div>
      </div>

      <!-- 次の感情（回避フェーズの予告） -->
      <div class="forecast" aria-live="polite">
        <span class="forecast-cap">次の感情</span>
        <span id="emotion-forecast" class="forecast-name">—</span>
      </div>
    </section>

    <!-- ===== 会話欄（村長のセリフ / 感情のことば） ===== -->
    <section class="dialogue-zone">
      <div class="dialogue" id="dialogue" aria-live="polite"></div>
    </section>

    <!-- ===== ステージ：コマンド選択 と 感情回避フェーズ を切り替える ===== -->
    <section class="stage">

      <!-- コマンド選択（command フェーズ） -->
      <div class="command-panel" id="command-panel">
        <div class="cmd-cats" id="cmd-cats"><!-- 4つの親コマンドを ui.js が並べる --></div>
        <div class="cmd-subs" id="cmd-subs"><!-- 選んだ親の小さな選択肢を ui.js が並べる --></div>
      </div>

      <!-- 感情回避フェーズ（dodge フェーズ） -->
      <div class="dodge-panel" id="dodge-panel" hidden>
        <div class="dodge-top">
          <span class="dodge-emotion" id="dodge-emotion">—</span>
          <span class="dodge-timer" id="dodge-timer"></span>
        </div>
        <!-- 弾よけのエリア。touch-action:none で スマホのスクロールを止める -->
        <canvas id="dodge-canvas" width="460" height="240"></canvas>
        <p class="dodge-help" id="dodge-help"></p>
      </div>

    </section>

    <!-- ===== プレイヤー（無機質な主人公 L） ===== -->
    <section class="player-zone">
      <div class="player-tag">YOU — L / kotoba-android</div>
      <div class="bar player-bar">
        <div class="bar-fill noise" id="noise-fill"></div>
        <span class="bar-cap">ノイズ耐性</span>
        <span class="bar-num" id="noise-num">20 / 20</span>
      </div>
    </section>

    <!-- ===== ログ ===== -->
    <section class="log-zone">
      <div class="log-cap">やりとりの記録</div>
      <div class="log" id="log"></div>
    </section>

  </main>

  <!-- ===== 勝敗オーバーレイ ===== -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box">
      <h2 class="overlay-title" id="overlay-title"></h2>
      <div class="overlay-text" id="overlay-text"></div>
      <div class="overlay-actions">
        <button class="btn-again" id="btn-again">もう一度遊ぶ</button>
        <a class="btn-back" id="btn-back" href="../../">Battle Labに戻る</a>
      </div>
    </div>
  </div>

  <!-- 読み込み順：データ → 進行ルール → 弾よけ模型 → 描画 → 配線 -->
  <script src="js/data.js?v=1"></script>
  <script src="js/engine.js?v=1"></script>
  <script src="js/bullet.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
