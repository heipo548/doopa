<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle 13：間合いと言葉の読み合いバトル — Battle Lab / DOOPA</title>
  <meta name="description" content="DOOPA バトルシステム試作場：相手との距離感を読み、近づく・離れる・黙るを選ぶ同時選択バトル。" />
  <link rel="stylesheet" href="style.css?v=1" />
  <link rel="stylesheet" href="tutor.css?v=1" />
</head>
<body>
  <!--
    Battle 13「間合いと言葉の読み合いバトル」モック
    ・距離5段階を管理しながら、毎ターン同時選択で読み合う。
    ・近づきすぎても遠すぎてもダメ。証人の“癖”を読む。
    ・依存ゼロ：HTML/CSS/JS。証人AIは乱数なし（engine.resolveTurn）。
  -->
  <header class="lab-head">
    <a class="back" href="../../">← Battle Lab</a>
    <p class="lab-name">バトルシステム試作場 / Battle Lab</p>
    <h1 class="mock-title">Battle 13：間合いと言葉の読み合いバトル</h1>
    <p class="mock-en">スマブラ 参考 ・ The Distance Between Words</p>
    <div class="intro" id="mock-intro"></div>
  </header>

  <main class="stage">
    <section class="panel">
      <div class="dist-track" id="dist-track"></div>
      <div class="dist-label" id="dist-label"></div>
    </section>

    <section class="panel status">
      <div class="enemy">
        <div class="enemy-name" id="enemy-name">証人</div>
        <div class="bar-row"><span class="cap">ざわめき</span>
          <div class="bar"><div class="bar-fill zawameki" id="zawameki-fill"></div></div>
          <span class="bar-num" id="zawameki-num"></span></div>
        <div class="pip-row"><span class="cap">警戒</span><span class="pip keikai" id="keikai-pips"></span></div>
      </div>
      <div class="player">
        <div class="player-tag">YOU — L / kotoba-android</div>
        <div class="bar-row"><span class="cap">こころ</span>
          <div class="bar"><div class="bar-fill kokoro" id="kokoro-fill"></div></div>
          <span class="bar-num" id="kokoro-num"></span></div>
        <div class="read" id="read-num"></div>
      </div>
    </section>

    <section class="panel reveal-panel">
      <div class="last-reveal empty" id="last-reveal"></div>
      <h3 class="sub-cap">証人の癖（観察中）</h3>
      <div class="tells" id="tells"></div>
    </section>

    <section class="panel">
      <h2 class="sec-cap">あなたの行動（証人と同時）</h2>
      <div class="acts" id="acts"></div>
    </section>

    <section class="panel">
      <h2 class="sec-cap">ログ</h2>
      <div class="log" id="log"></div>
    </section>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box" id="overlay-box">
      <h2 class="overlay-title" id="overlay-title"></h2>
      <div class="overlay-text" id="overlay-text"></div>
      <div class="overlay-actions">
        <button class="restart" id="restart-btn">もう一度 遊ぶ</button>
        <a class="to-lab" href="../../">Battle Lab に戻る</a>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=1"></script>
  <script src="js/engine.js?v=1"></script>
  <script src="js/audio.js?v=1"></script>
  <script src="js/tutor.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
