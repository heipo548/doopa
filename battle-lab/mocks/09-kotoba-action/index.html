<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle 09：ことばアクションコマンドバトル — Battle Lab / DOOPA</title>
  <meta name="description" content="DOOPA バトルシステム試作場：同じ言葉でも、届けるタイミングで効果が変わるコマンドバトル。" />
  <link rel="stylesheet" href="style.css?v=1" />
</head>
<body>
  <!--
    Battle 09「ことばアクションコマンドバトル」モック
    ・コマンド選択のあとに“タイミング入力”がある。同じ言葉でも届け方で効果が変わる。
    ・早すぎると急かし、遅すぎると届かない。だまる＝待つのが正解の時もある。
    ・依存ゼロ：HTML/CSS/JS。アニメは main.js、判定は engine.js（pos 0..100）。
  -->
  <header class="lab-head">
    <a class="back" href="../../">← Battle Lab</a>
    <p class="lab-name">バトルシステム試作場 / Battle Lab</p>
    <h1 class="mock-title">Battle 09：ことばアクションコマンドバトル</h1>
    <p class="mock-en">How You Say It</p>
    <div class="intro" id="mock-intro"></div>
  </header>

  <main class="stage">
    <section class="panel status">
      <div class="enemy">
        <div class="enemy-face" aria-hidden="true">
          <svg viewBox="0 0 120 120" width="64" height="64">
            <rect x="24" y="30" width="72" height="58" rx="10" fill="#fff3d6" stroke="#e7b870" stroke-width="2"/>
            <circle cx="60" cy="24" r="14" fill="#ffe4b5" stroke="#e7b870" stroke-width="2"/>
            <circle cx="55" cy="24" r="2.6" fill="#5b4a36"/><circle cx="66" cy="24" r="2.6" fill="#5b4a36"/>
            <path d="M40 52 h40 M40 64 h28" stroke="#bda" stroke-width="3" stroke-linecap="round"/>
            <text x="60" y="52" font-size="9" text-anchor="middle" fill="#b08f6a">wor_d</text>
          </svg>
        </div>
        <div class="enemy-meta">
          <div class="enemy-name" id="enemy-name">先生</div>
          <div class="bar-row"><span class="cap">ざわめき</span>
            <div class="bar"><div class="bar-fill zawameki" id="zawameki-fill"></div></div>
            <span class="bar-num" id="zawameki-num"></span></div>
          <div class="pip-row"><span class="cap">警戒</span><span class="pip keikai" id="keikai-pips"></span></div>
        </div>
      </div>
      <div class="player">
        <div class="player-tag">YOU — L / kotoba-android</div>
        <div class="bar-row"><span class="cap">こころ</span>
          <div class="bar"><div class="bar-fill kokoro" id="kokoro-fill"></div></div>
          <span class="bar-num" id="kokoro-num"></span></div>
        <div class="streak" id="streak-num"></div>
      </div>
    </section>

    <section class="panel">
      <h2 class="sec-cap">ことば（選ぶ → タイミングで届ける）</h2>
      <div id="action-area"></div>
    </section>

    <section class="panel">
      <h2 class="sec-cap">ログ</h2>
      <div class="log" id="log"></div>
    </section>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box" id="overlay-box">
      <h2 class="overlay-title" id="overlay-title"></h2>
      <div class="overlay-text" id="overlay-text"></div>
      <div class="overlay-actions">
        <button class="restart" id="restart-btn">もう一度 遊ぶ</button>
        <a class="to-lab" href="../../">Battle Lab に戻る</a>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=1"></script>
  <script src="js/engine.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
