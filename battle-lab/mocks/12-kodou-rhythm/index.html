<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle 12：鼓動リズムバトル — Battle Lab / DOOPA</title>
  <meta name="description" content="DOOPA バトルシステム試作場：敵の呼吸や鼓動を聞き、合わせたりずらしたりする静かなリズムバトル。" />
  <link rel="stylesheet" href="style.css?v=1" />
  <link rel="stylesheet" href="tutor.css?v=1" />
</head>
<body>
  <!--
    Battle 12「鼓動リズムバトル」モック
    ・相手の鼓動リズム（安定/乱れ/無音）を聞き、合わせる・ずらす・無音では だまる。
    ・ずっと合わせるだけでは“飲まれる”。静かで少し不安なリズム。
    ・依存ゼロ：HTML/CSS/JS。判定は engine.resolveBeat(cmd, hit)。
  -->
  <header class="lab-head">
    <a class="back" href="../../">← Battle Lab</a>
    <p class="lab-name">バトルシステム試作場 / Battle Lab</p>
    <h1 class="mock-title">Battle 12：鼓動リズムバトル</h1>
    <p class="mock-en">Patapon 参考 ・ Listen to the Breathing</p>
    <div class="intro" id="mock-intro"></div>
  </header>

  <main class="stage">
    <section class="panel status">
      <div class="enemy">
        <div class="enemy-name" id="enemy-name">灯台の影</div>
        <div class="bar-row"><span class="cap">ざわめき</span>
          <div class="bar"><div class="bar-fill zawameki" id="zawameki-fill"></div></div>
          <span class="bar-num" id="zawameki-num"></span></div>
      </div>
      <div class="player">
        <div class="player-tag">YOU — L / kotoba-android</div>
        <div class="bar-row"><span class="cap">こころ</span>
          <div class="bar"><div class="bar-fill kokoro" id="kokoro-fill"></div></div>
          <span class="bar-num" id="kokoro-num"></span></div>
        <div class="pip-row"><span class="cap">同調</span><span class="pip sync" id="sync-pips"></span></div>
        <div class="pip-row"><span class="cap">飲まれ</span><span class="pip drown" id="drown-pips"></span></div>
      </div>
    </section>

    <section class="panel beat-panel">
      <div class="pattern-label" id="pattern-label"></div>
      <div class="beat-row" id="beat-row"></div>
      <p class="beat-hint">●が来た瞬間に合わせる。無音（…だけ）のときは「だまる」。</p>
    </section>

    <section class="panel">
      <h2 class="sec-cap">ことば（鼓動に合わせて押す）</h2>
      <div class="cmd-grid" id="cmd-area"></div>
    </section>

    <section class="panel">
      <h2 class="sec-cap">ログ</h2>
      <div class="log" id="log"></div>
    </section>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box" id="overlay-box">
      <h2 class="overlay-title" id="overlay-title"></h2>
      <div class="overlay-text" id="overlay-text"></div>
      <div class="overlay-actions">
        <button class="restart" id="restart-btn">もう一度 遊ぶ</button>
        <a class="to-lab" href="../../">Battle Lab に戻る</a>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=1"></script>
  <script src="js/engine.js?v=1"></script>
  <script src="js/audio.js?v=1"></script>
  <script src="js/tutor.js?v=1"></script>
  <script src="js/ui.js?v=1"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
