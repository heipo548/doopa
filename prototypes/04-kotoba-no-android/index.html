<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ルゥと せかいの あいだ — ことばに ひとつ 足すと、せかいに なる</title>
  <meta name="description" content="DOOPA プロト#04（MVP・仮）。手を出せない村で、ひろった ことばだけが きみの きばに なる。とげの ことばで言い負かすか、やわらかい ことばで寄り添うか——どう勝ったかが、きみを 染める。探索×ことばのカードバトル。" />

  <!-- 日本語ピクセルフォント（DotGothic16）。可愛いポップ＋ドット絵の雰囲気を底上げ。
       読み込めない/オフラインでも CSS 側 system フォントへ自動フォールバックするので動作に影響しない。 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<!-- theme-pop が既定（涼ラベンダーの村）。凶暴が溜まると JS（state.darkLevel）が body へ
     dark-1/2/3 を付け、世界の色温度が寒色へ冷えていく＝主人公ルゥだけが翳る演出。 -->
<body class="theme-pop">

  <!-- ════════════ 背景：手を出せない村（CSS/SVG のみ・操作透過） ════════════ -->
  <div id="scene" aria-hidden="true">
    <div class="scene-sky"></div>
    <div class="scene-clouds">
      <span class="cloud" style="left:10%; top:12%"></span>
      <span class="cloud" style="left:40%; top:7%"></span>
      <span class="cloud" style="left:68%; top:16%"></span>
      <span class="cloud" style="left:86%; top:9%"></span>
    </div>
    <div class="scene-hill hill-back"></div>
    <div class="scene-hill hill-mid"></div>
    <div class="scene-path"></div>
    <div class="scene-houses">
      <span class="house h-1" style="left:14%"></span>
      <span class="house h-2" style="left:33%"></span>
      <span class="house h-3" style="left:55%"></span>
      <span class="house h-4" style="left:74%"></span>
      <span class="house h-5" style="left:89%"></span>
    </div>
    <!-- 木・茂み・花（家と同じ床〜手前。村を少し賑やかに） -->
    <span class="scene-tree" style="left:5%"><span class="leaves"></span><span class="trunk"></span></span>
    <span class="scene-tree t-r t-small" style="left:46%"><span class="leaves"></span><span class="trunk"></span></span>
    <span class="scene-bush" style="left:22%"></span>
    <span class="scene-bush" style="left:62%"></span>
    <span class="scene-flower" style="left:20%; --fl:#f2a9c4"></span>
    <span class="scene-flower" style="left:25%; --fl:#9ab8f0"></span>
    <span class="scene-flower" style="left:60%; --fl:#f2c46a"></span>
    <span class="scene-flower" style="left:66%; --fl:#c79af0"></span>

    <!-- 井戸（いど）：神様「井戸の こえ」の居場所。水底に“見ているだれか”の気配。 -->
    <div class="scene-well" aria-hidden="true">
      <svg viewBox="0 0 64 86" width="100%" height="100%" preserveAspectRatio="xMidYMax meet" role="img" aria-label="井戸">
        <rect x="11" y="30" width="5" height="34" rx="2" fill="#a98c74"/>
        <rect x="48" y="30" width="5" height="34" rx="2" fill="#a98c74"/>
        <path d="M32 8 L60 32 L4 32 Z" fill="#c9a27e"/>
        <path d="M32 8 L32 32 L4 32 Z" fill="rgba(255,255,255,0.18)"/>
        <rect x="3" y="30" width="58" height="5" rx="2.5" fill="#b58b66"/>
        <ellipse cx="32" cy="80" rx="26" ry="6" fill="rgba(70,60,120,0.18)"/>
        <path d="M8 58 Q8 52 14 52 L50 52 Q56 52 56 58 L54 78 Q54 82 48 82 L16 82 Q10 82 10 78 Z" fill="#cdbfae"/>
        <g stroke="#b3a48f" stroke-width="1.4" stroke-linecap="round">
          <line x1="20" y1="56" x2="19" y2="80"/>
          <line x1="32" y1="55" x2="32" y2="81"/>
          <line x1="44" y1="56" x2="45" y2="80"/>
        </g>
        <ellipse cx="32" cy="54" rx="24" ry="7" fill="#ded2c0"/>
        <ellipse cx="32" cy="54" rx="19" ry="5" fill="#3a3552"/>
        <ellipse class="well-water" cx="32" cy="55" rx="15" ry="3.6" fill="#5b63d6"/>
        <ellipse cx="29" cy="54" rx="6" ry="1.2" fill="rgba(255,255,255,0.55)"/>
        <circle class="well-eye" cx="32" cy="55" r="1.4" fill="#efe6ff"/>
      </svg>
    </div>

    <div class="scene-ground"></div>
  </div>

  <!-- ════════════ バトルHUD（タイトル/フィールド等では hidden） ════════════
       中身（#topbar #enemy-area #log #player-bar #prompt #command-bar）は ui.js が描画。
       ※思いやり(omoiyari)は UI に一切出さない＝ここに器を置かない。 -->
  <div id="game" class="hidden">
    <div class="battle-card">
      <header id="topbar"></header>
      <section id="enemy-area"></section>
      <section id="log" aria-live="polite"></section>
      <section id="player-bar"></section>
      <section id="prompt"></section>
      <nav id="command-bar"></nav>
    </div>
  </div>

  <!-- 一時メッセージ（セーブ・気づき・ヒント） -->
  <div id="toast"></div>

  <!-- ════════════ オーバーレイ群（すべて class="overlay"・hidden でトグル） ════════════ -->

  <!-- タイトル -->
  <div id="overlay-title" class="overlay">
    <div class="ov-panel title-panel"></div>
  </div>

  <!-- フィールド（探索）：広場（俯瞰）。ノードと主人公ルゥは ui が描画。 -->
  <div id="overlay-field" class="overlay hidden">
    <div class="field-body">
      <div class="field-top">
        <span class="field-area"></span>
        <span class="field-hint"></span>
      </div>
      <div class="field-plaza"></div>
      <div class="field-msg"></div>
      <div class="field-sub"></div>
    </div>
  </div>

  <!-- 会話（NPC） -->
  <div id="overlay-dialogue" class="overlay hidden">
    <div class="ov-panel dialogue-panel"></div>
  </div>

  <!-- カード入手（3択） -->
  <div id="overlay-cards" class="overlay hidden">
    <div class="ov-panel cards-panel"></div>
  </div>

  <!-- 学校＝ことばショップ（1枚 受け取る） -->
  <div id="overlay-shop" class="overlay hidden">
    <div class="ov-panel shop-panel"></div>
  </div>

  <!-- 結果／簡易エンド（傾向反映＋軽いメタ1行） -->
  <div id="overlay-result" class="overlay hidden">
    <div class="ov-panel result-panel"></div>
  </div>

  <!-- 神様メタ（井戸の こえ）：操作計測の見透かし＋word→world / L の回収 -->
  <div id="overlay-meta" class="overlay hidden">
    <div class="ov-panel meta-panel"></div>
  </div>

  <!-- ゲームオーバー（非パーマデス：直前セーブから再開／タイトルへ） -->
  <div id="overlay-gameover" class="overlay hidden">
    <div class="ov-panel gameover-panel"></div>
  </div>

  <!-- ポーズ（中断メニュー） -->
  <div id="overlay-pause" class="overlay hidden">
    <div class="ov-panel pause-panel"></div>
  </div>

  <!-- 常設メニュー（☰）：フィールド/バトル中だけ右上に。 -->
  <button id="menu-btn" class="menu-btn hidden" title="メニュー（中断）" aria-label="メニュー">☰</button>

  <!-- ════════════ スクリプト読み込み順（house 様式・contract 準拠） ════════════
       data → audio → metrics → state → save → battle → cards → field → ui → main -->
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/metrics.js"></script>
  <script src="js/state.js"></script>
  <script src="js/save.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/field.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
