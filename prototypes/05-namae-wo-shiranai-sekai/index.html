<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>名前を知らない世界 — ことばを 覚えるたびに、せかいに 意味が 増えていく</title>
  <meta name="description" content="DOOPA プロト#05（体験版）。言葉を知らない主人公が、観察・耳をすます・対話で言葉を覚え、？？？だった世界が少しずつ読めるようになる。戦わない探索RPG。橋の遭遇＝戦わないけど、ちゃんとゲームになる。" />

  <!-- 日本語の手書き風フォント（Yusei Magic）。読み込めない/オフラインでも CSS の system フォントへ
       自動フォールバックするので、動作には一切影響しない（依存ゼロを保つ）。 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=2" />
</head>
<!-- data-theme は ui.render() が現在エリア(forest/bridge/village)/title をセット＝背景の色温度が変わる -->
<body data-theme="title">

  <!-- ════════ フィールド（見下ろしマップ）。canvas に地形・主人公・もや・名札を描く ════════ -->
  <div id="view-field" class="view hidden">
    <!-- 上部HUD：エリア名・つぎの目的 -->
    <div id="field-hud" class="field-hud">
      <div id="field-area" class="field-area"></div>
      <div id="field-objective" class="field-objective"></div>
    </div>

    <!-- マップ本体 -->
    <div class="canvas-wrap">
      <canvas id="field-canvas" width="660" height="484" aria-label="フィールド"></canvas>
    </div>

    <!-- 下部：一言ログ＋操作ヒント -->
    <div id="field-msg" class="field-msg" aria-live="polite"></div>
    <div class="field-controls">
      <span class="ctrl-hint">移動：タップ / 矢印キー　　しらべる・はなす：近づいて タップ / Space</span>
    </div>

    <!-- 覚えた言葉カウンタ（クリックで一覧へ） -->
    <button id="vocab-badge" class="vocab-badge" data-action="openVocab" title="覚えた言葉">
      📖 ことば <b id="vocab-count">0</b>
    </button>

    <!-- 中断メニュー（☰） -->
    <button id="menu-btn" class="menu-btn hidden" title="メニュー（中断）" aria-label="メニュー">☰</button>
  </div>

  <!-- ════════ オーバーレイ群（すべて .overlay・hidden でトグル） ════════ -->

  <!-- タイトル（ui.renderTitle が中身を作る） -->
  <div id="ov-title" class="overlay hidden"></div>

  <!-- 遭遇（相手の絵・セリフ・様子・選択肢） -->
  <div id="ov-encounter" class="overlay hidden">
    <div class="enc-card">
      <div class="enc-head">
        <canvas id="enc-portrait" class="enc-portrait" width="132" height="132" aria-hidden="true"></canvas>
        <div class="enc-bubble">
          <div id="enc-speaker" class="enc-speaker"></div>
          <div id="enc-speech" class="enc-speech"></div>
        </div>
      </div>
      <div id="enc-mood" class="enc-mood"></div>
      <div class="enc-saywrap">
        <div id="enc-say" class="enc-say"></div>
        <div id="enc-hint" class="enc-hint"></div>
      </div>
      <div id="enc-actions" class="enc-actions"></div>
    </div>
  </div>

  <!-- 会話（NPC） -->
  <div id="ov-dialogue" class="overlay hidden">
    <div class="dia-card">
      <div id="dia-name" class="dia-name"></div>
      <div id="dia-body" class="dia-body"></div>
      <div id="dia-hint" class="dia-hint"></div>
    </div>
  </div>

  <!-- 調べる -->
  <div id="ov-look" class="overlay hidden">
    <div class="look-card">
      <div id="look-body" class="look-body"></div>
      <div id="look-hint" class="look-hint"></div>
    </div>
  </div>

  <!-- ラスト（母と再会 → 友達）。main.startFinale が中身を作る -->
  <div id="ov-finale" class="overlay hidden"></div>

  <!-- エンディング。ui.renderEndingShell が中身を作る -->
  <div id="ov-ending" class="overlay hidden"></div>

  <!-- ポーズ。ui.renderPause が中身を作る -->
  <div id="ov-pause" class="overlay hidden"></div>

  <!-- 覚えた言葉 一覧。ui.renderVocab が中身を作る -->
  <div id="ov-vocab" class="overlay hidden"></div>

  <!-- 言葉 習得ポップアップ（画面中央） -->
  <div id="learn-pop" class="learn-pop"></div>

  <!-- 一時メッセージ -->
  <div id="toast" class="toast"></div>

  <!-- ════════ スクリプト読み込み順（contract）：
       data → audio → words → state → save → field → encounter → ui → main ════════ -->
  <script src="js/data.js?v=2"></script>
  <script src="js/audio.js?v=2"></script>
  <script src="js/words.js?v=2"></script>
  <script src="js/state.js?v=2"></script>
  <script src="js/save.js?v=2"></script>
  <script src="js/field.js?v=2"></script>
  <script src="js/encounter.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/main.js?v=2"></script>
</body>
</html>
