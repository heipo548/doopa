<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>さいごのともだち — ことばで、たたかう夜</title>
  <meta name="description" content="ことばで戦う口喧嘩バトルのサバイバーRPG「さいごのともだち」。ぶつけるか、きいてみるか、手をのばすか。言えなかった言葉が、言えるようになる。" />
  <!-- 日本語ピクセルフォント（DotGothic16）。ドット絵の雰囲気を一気に上げる。
       読み込めない/オフライン時は下の system フォントへ自動フォールバックするので動作には影響しない。 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-night">
  <!-- 背景：夜明け前の山道（ドット絵風）。空・尾根3層・ランタンの灯り・小さな仲間の列。
       添付リファレンスの“寒色の夜＋暖色の灯り”を、素材なしのCSSピクセルアートで再構築。 -->
  <div id="scene" aria-hidden="true">
    <div class="scene-sky"></div>
    <div class="scene-stars"></div>
    <div class="scene-ridge ridge-back"></div>
    <div class="scene-ridge ridge-mid"></div>
    <div class="scene-ridge ridge-front"></div>
    <div class="scene-ground"></div>
    <div class="scene-lanterns">
      <span class="lantern" style="left:8%"></span>
      <span class="lantern" style="left:21%"></span>
      <span class="lantern" style="left:39%"></span>
      <span class="lantern" style="left:58%"></span>
      <span class="lantern" style="left:74%"></span>
      <span class="lantern" style="left:90%"></span>
    </div>
    <div class="scene-walkers">
      <span class="walker" style="left:30%"></span>
      <span class="walker" style="left:44%"></span>
      <span class="walker lead" style="left:55%"></span>
      <span class="walker" style="left:67%"></span>
    </div>
  </div>

  <!-- 戦闘HUD。タイトル/街/道では hidden（applyScreen が battle のときだけ表示）。
       ★初期は hidden：タイトル画面で WAVE や数値・ボタンが見えないように（P0-1）。 -->
  <div id="game" class="hidden">
    <!-- 上部バー：夜明けへの進み（ドット）＋ミュート。
         ※おいはらった/むかえた/きずな の“管理数値”は前面に出さない方針（結果は街の景色で返す）。 -->
    <header id="topbar">
      <div id="wave-info"></div>
      <button id="mute-btn" title="音のON/OFF">♪</button>
    </header>

    <!-- なかま：手をのばして むかえた友が ここに並んで増えていく（救った手応え） -->
    <section id="nakama-tray" aria-label="なかま"></section>

    <!-- 敵エリア -->
    <section id="enemy-area"></section>

    <!-- 戦闘ログ -->
    <section id="log" aria-live="polite"></section>

    <!-- プレイヤーステータス -->
    <section id="player-bar"></section>

    <!-- サブ操作（武器/ACT/対象/どうぐ の案内） -->
    <section id="prompt"></section>

    <!-- コマンドバー -->
    <nav id="command-bar"></nav>
  </div>

  <!-- 一時メッセージ -->
  <div id="toast"></div>

  <!-- タイトル画面 -->
  <div id="overlay-title" class="overlay">
    <div class="ov-panel title-panel">
      <h1 class="game-title">さいごのともだち</h1>
      <p class="game-subtitle">LAST FRIEND STANDING ― ことばで、たたかう夜</p>
      <!-- タイトルは“寂しい夜が はじまる”空気だけを先に渡す（数値や遊び方の説明は出さない＝P0-1）。
           遊び方は第一夜のチュートリアルで、操作と反応で伝える。 -->
      <p class="title-prologue">ながい よるの はなし。
ともだちは みんな いなくなった。
それでも 夜は、だれかを つれてくる。</p>
      <!-- セーブがある時だけ「つづきから」を出す（main.js が表示制御）。 -->
      <button id="title-continue" class="start-btn hidden">▶ つづきから</button>
      <button id="start-btn" class="start-btn">▶ はじめる</button>
      <button id="title-settings" class="title-settings" title="せってい">⚙ せってい</button>
    </div>
  </div>

  <!-- 設定（アクセシビリティ）：音・モーション・文字の大きさ・セーブ消去。タイトル/街から開く。 -->
  <div id="overlay-settings" class="overlay hidden">
    <div class="ov-panel settings-panel">
      <div class="ov-body">
        <h2 class="ov-title">せってい</h2>
        <button class="set-row" id="set-mute"><span>♪ おと</span><b id="set-mute-v">ON</b></button>
        <button class="set-row" id="set-motion"><span>🌀 うごき（モーション）</span><b id="set-motion-v">ふつう</b></button>
        <button class="set-row" id="set-text"><span>🔤 もじの おおきさ</span><b id="set-text-v">ふつう</b></button>
        <button class="set-row danger" id="set-clear"><span>🗑 セーブを けして はじめから</span></button>
        <button class="start-btn" id="set-close">とじる</button>
      </div>
    </div>
  </div>

  <!-- プロローグ：タイトル→第一夜の街 の間に1枚だけ。世界・ぽち・目的を最小限。スキップ可（マウスのみ）。 -->
  <div id="overlay-prologue" class="overlay hidden">
    <div class="ov-panel prologue-panel">
      <p class="prologue-text">ともだちは、みんな いなくなった。
よるが、ながく なった。
それでも 道には、だれかが いる。
こわい かおを して。……ほんとは、さみしいだけ。
きみは ちいさな いきもの。なまえは、ぽち。
むかえに、いこう。</p>
      <div class="prologue-btns">
        <button id="prologue-go" class="start-btn">▶ つづける</button>
        <button id="prologue-skip" class="prologue-skip">スキップ</button>
      </div>
    </div>
  </div>

  <!-- 街（拠点）ハブ：v0.4 メタループ。夜カウンタ・灯り・なかま・覚えたことば・「夜へ でかける」。 -->
  <div id="overlay-town" class="overlay hidden">
    <div class="ov-panel town-panel"><div class="ov-body"></div></div>
  </div>

  <!-- 夜のフィールド（横スクロールの道）：歩いて拾う／むかえる／道のおわりで戦闘へ。 -->
  <div id="overlay-field" class="hidden">
    <div class="field-body"></div>
  </div>

  <!-- レベルアップ（3択） -->
  <div id="overlay-levelup" class="overlay hidden">
    <div class="ov-panel"><div class="ov-body"></div></div>
  </div>

  <!-- 結末 / RUN OVER -->
  <div id="overlay-result" class="overlay hidden">
    <div class="ov-panel"><div class="ov-body"></div></div>
  </div>

  <!-- マクロ結末（いくつもの夜の総和）：さいごの夜を越えたあとの「ほんとうの夜明け」。 -->
  <div id="overlay-macro" class="overlay hidden">
    <div class="ov-panel"><div class="ov-body"></div></div>
  </div>

  <!-- スクリプト：データ→音→状態→戦闘→カード→（街/道/周回）→UI→起動 の順で読み込む -->
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/save.js"></script>
  <script src="js/state.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/field.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
